<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffb6c1 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h2 {
            color: #ff1493;
            font-weight: 600;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 0;
        }
        .status {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .status.connected {
            color: #28a745;
        }
        #chat {
            width: 100%;
            max-width: 600px;
            height: 400px;
            overflow-y: auto;
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border: 2px solid #ff69b4;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            position: relative;
        }
        #chat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="%23ff69b4" opacity="0.1"/><circle cx="80" cy="30" r="1.5" fill="%23ff1493" opacity="0.1"/><circle cx="40" cy="70" r="1" fill="%23ffb6c1" opacity="0.1"/></svg>');
            pointer-events: none;
            border-radius: 20px;
        }
        .message {
            background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 100%);
            color: #333;
            padding: 12px 18px;
            border-radius: 25px;
            margin: 8px 0;
            max-width: 70%;
            word-wrap: break-word;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-in;
            position: relative;
        }
        .message.self {
            background: linear-gradient(135deg, #ff1493 0%, #ff0066 100%);
            color: #fff;
            margin-left: auto;
            text-align: right;
        }
        .message::after {
            content: '';
            position: absolute;
            bottom: -5px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
        }
        .message:not(.self)::after {
            left: 15px;
            border-top: 10px solid #ffb6c1;
        }
        .message.self::after {
            right: 15px;
            border-top: 10px solid #ff1493;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #input-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #msg {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            background: transparent;
        }
        #msg::placeholder {
            color: #aaa;
        }
        button {
            background: linear-gradient(135deg, #ff1493 0%, #ff0066 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 20, 147, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="header">
    <h2>💬 AgVosbChat</h2>
    <div id="status" class="status">Connecting...</div>
</div>
<div id="chat"></div>
<div id="input-container">
    <input type="text" id="msg" placeholder="Type your message here... ✨">
    <button onclick="sendMsg()">Send 🚀</button>
</div>
<script>
const socket = new WebSocket("wss://agvosbchat.onrender.com");
const chat = document.getElementById("chat");
const statusEl = document.getElementById("status");

socket.onopen = () => {
    console.log("Connected to server");
    statusEl.textContent = "Connected ✅";
    statusEl.classList.add("connected");
};
socket.onclose = () => {
    statusEl.textContent = "Disconnected ❌";
    statusEl.classList.remove("connected");
};
socket.onmessage = (event) => {
    let div = document.createElement("div");
    div.className = "message";
    div.innerText = event.data;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
};
function sendMsg(){
    let input = document.getElementById("msg");
    if(input.value.trim() !== "") {
        let div = document.createElement("div");
        div.className = "message self";
        div.innerText = input.value;
        chat.appendChild(div);
        socket.send(input.value);
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }
}

// Allow sending with Enter key
document.getElementById("msg").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMsg();
    }
});
</script>
</body>
</html>
